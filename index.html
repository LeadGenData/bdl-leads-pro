<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDL Leads Pro</title>
<style>
:root{
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;
  --border:#1f1f1f;--border2:#2a2a2a;
  --orange:#ff6a00;--orange2:#e85000;--orange3:#ff8c38;--og:rgba(255,106,0,.2);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--yellow:#eab308;
  --r:12px;--rs:8px;--rx:6px;--tr:.2s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;font-size:13px}
input,select,textarea,button{font-family:inherit;font-size:13px}
.h{display:none!important}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:#1f1f1f;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--orange)}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(255,106,0,.06),#000 70%)}
.lcard{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:20px;padding:36px 32px;width:320px;text-align:center;animation:fup .4s ease both}
.lcard h1{font-size:22px;font-weight:800;margin-bottom:4px}
.lcard p{color:var(--text3);font-size:12px;margin-bottom:22px}
.lcard input{width:100%;background:#111;border:1px solid #1f1f1f;border-radius:var(--rs);padding:12px;color:var(--text);margin-bottom:10px;outline:none;display:block}
.lcard input:focus{border-color:var(--orange)}
.lbtn{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border:none;border-radius:var(--rs);padding:12px;font-size:14px;font-weight:700;cursor:pointer}
.hint{color:#555;font-size:11px;margin-top:14px;background:#111;border:1px solid #1f1f1f;border-radius:6px;padding:8px 10px;line-height:1.8}
@keyframes orb-spin{0%{transform:rotate(0deg) translateX(34px) rotate(0deg)}100%{transform:rotate(360deg) translateX(34px) rotate(-360deg)}}

/* LOADER */
#load{position:fixed;inset:0;background:rgba(0,0,0,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400}
#load p{color:var(--orange3);font-size:13px;margin-top:14px}
.spin{width:38px;height:38px;border:3px solid #111;border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite}

/* APP */
#app{transition:margin-right .35s ease}
#app.lp{margin-right:480px}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 22px;background:#000;border-bottom:1px solid #1a1a1a;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px}
.logo{position:relative;width:34px;height:34px;flex-shrink:0}
.logo-ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#ff6a00,#ffb347,#e85000,#ff6a00);-webkit-mask:radial-gradient(circle,transparent 52%,black 53%);mask:radial-gradient(circle,transparent 52%,black 53%);animation:spin2 3s linear infinite}
.logo-inner{position:absolute;inset:4px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1}
.logo-b{font-size:12px;font-weight:900;color:#fff}
.logo-dl{font-size:6px;font-weight:800;color:var(--orange);letter-spacing:2px}
.brand-txt h1{font-size:16px;font-weight:800;letter-spacing:-.3px}
.brand-txt h1 em{color:var(--orange3);font-style:normal;font-size:12px;font-weight:500;margin-left:3px}
#lcount{color:#2a2a2a;font-size:11px;margin-top:1px}
.hacts{display:flex;gap:6px;align-items:center}
.hb{border-radius:var(--rx);padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s}
.hb-g{background:transparent;color:#475569;border-color:#1a1a1a}
.hb-g:hover{background:#111;color:var(--text2)}
.hb-o{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border-color:transparent}
.hb-o:hover{opacity:.88}
.syns{display:flex;align-items:center;gap:5px;padding:5px 9px;background:#111;border:1px solid #1a1a1a;border-radius:var(--rx)}
#sdot{width:6px;height:6px;border-radius:50%;background:var(--green)}
#sdot.s{background:var(--yellow);animation:pulse .8s infinite}
#stxt{font-size:11px;color:#333}
#ulbl{font-size:11px;color:var(--orange3);background:#0f0800;border:1px solid #2a1500;border-radius:var(--rx);padding:5px 9px;font-weight:700}
#fmsg{font-size:11px;padding:5px 11px;border-radius:20px;font-weight:700}
#fmsg.ok{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
#fmsg.bad{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}

/* MAIN */
.main{padding:18px 22px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.sc{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;transition:all .2s}
.sc:hover{border-color:var(--orange);transform:translateY(-2px)}
.sc-acc{position:absolute;top:0;left:0;right:0;height:2px}
.sc-body{padding:14px 16px 12px}
.sc-ico{font-size:18px;margin-bottom:8px}
.sc-val{font-size:24px;font-weight:900;letter-spacing:-1px;line-height:1;margin-bottom:3px}
.sc-lbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.sc-foot{padding:7px 16px;border-top:1px solid #111;display:flex;align-items:center;justify-content:space-between}
.sc-pct{font-size:11px;font-weight:700;color:var(--text3)}
.sc-bar{width:44px;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px}

/* TABS */
.tabs-row{margin-bottom:16px}
.tabs{display:flex;gap:2px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:3px;width:fit-content}
.tab{padding:7px 18px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.tab.on{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff}

/* FILTERS */
.filters{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:var(--r);padding:10px 12px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{background:#111;border:1px solid #1f1f1f;border-radius:var(--rx);padding:7px 11px;color:var(--text);outline:none}
.filters input:focus,.filters select:focus{border-color:var(--orange)}
.filters input{flex:1;min-width:160px}
.addb{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border:none;border-radius:var(--rx);padding:7px 16px;font-weight:700;cursor:pointer}

/* ALERTS */
.alert-box{border-radius:var(--rx);padding:9px 13px;margin-bottom:7px;display:flex;gap:9px;align-items:flex-start;border-left:3px solid}

/* ADD FORM */
.aform{background:#0a0a0a;border:1px solid var(--orange);border-radius:var(--r);padding:16px;margin-bottom:14px;animation:fup .2s ease}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px;margin-bottom:12px}
.ef label{display:block;font-size:10px;color:#555;margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.ef input,.ef select,.ef textarea{width:100%;background:#111;border:1px solid #1f1f1f;border-radius:var(--rx);padding:7px 9px;color:var(--text);outline:none}
.ef input:focus,.ef select:focus,.ef textarea:focus{border-color:var(--orange)}
.ef textarea{resize:vertical;min-height:55px}
.sbtn{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border:none;border-radius:var(--rx);padding:7px 14px;font-weight:700;cursor:pointer;margin-right:6px}
.cbtn{background:#111;color:var(--text3);border:1px solid #1f1f1f;border-radius:var(--rx);padding:7px 11px;cursor:pointer}

/* TABLE */
.twrap{border-radius:var(--r);overflow:hidden;border:1px solid #1a1a1a;overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:#0d0d0d}
th{padding:10px 11px;text-align:left;color:#555;font-weight:700;font-size:11px;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid #1a1a1a}
td{padding:8px 11px;vertical-align:middle;border-bottom:1px solid #0f0f0f}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,106,0,.03)!important}
.clink{font-weight:700;color:var(--text);cursor:pointer;text-decoration:underline;text-decoration-color:#222;text-underline-offset:3px;transition:color .15s}
.clink:hover,.clink.on{color:var(--orange3);text-decoration-color:var(--orange)}
.ssel{border:none;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;outline:none;color:#fff}
.ab{border:none;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;font-weight:700;margin:1px;transition:all .12s;white-space:nowrap}
.ab:hover{filter:brightness(1.2);transform:translateY(-1px)}
.pri-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;white-space:nowrap}
.days-chip{font-size:11px;font-weight:700;font-family:monospace}

/* LEAD PANEL */
#lp{position:fixed;top:0;right:-480px;width:480px;height:100vh;background:#000;border-left:1px solid #1a1a1a;display:flex;flex-direction:column;z-index:150;transition:right .35s cubic-bezier(.4,0,.2,1);box-shadow:-20px 0 60px rgba(0,0,0,.8)}
#lp.open{right:0}
.lp-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #1a1a1a;flex-shrink:0;background:#050505}
.lp-hdr-l{flex:1;min-width:0}
.lp-sub{font-size:10px;color:#333;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.lp-name{font-size:15px;font-weight:800;color:var(--text)}
.lp-close{background:none;border:none;color:#333;font-size:16px;cursor:pointer;padding:5px 7px;border-radius:6px;line-height:1}
.lp-close:hover{background:#111;color:var(--text)}
.lp-scroll{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.lp-foot{padding:10px 14px;border-top:1px solid #1a1a1a;display:flex;gap:6px;flex-shrink:0;background:#050505}
.lp-sec{background:#050505;border:1px solid #111;border-radius:10px;padding:12px 14px}
.lp-sec h3{font-size:10px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.lp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lp-f label{display:block;font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.lp-f input,.lp-f select,.lp-f textarea{width:100%;background:#111;border:1px solid #1f1f1f;border-radius:6px;padding:7px 9px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.lp-f input:focus,.lp-f select:focus,.lp-f textarea:focus{border-color:var(--orange)}
.lp-f textarea{resize:vertical;min-height:56px}
.lp-full{grid-column:1/-1}
.lp-save{flex:2;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer}
.lp-save:hover{opacity:.88}
.lp-del{flex:1;background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.15);border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer}
.lp-del:hover{background:rgba(239,68,68,.18)}
.lp-fu-btn{flex:1;background:rgba(255,106,0,.1);color:var(--orange3);border:1px solid rgba(255,106,0,.2);border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer}
.lp-fu-btn:hover{background:rgba(255,106,0,.2)}
.log-entry{display:flex;gap:10px;background:#111;border-radius:5px;padding:6px 9px;margin-bottom:4px;border-left:2px solid var(--orange)}
.log-date{color:#333;font-size:10px;font-family:monospace;white-space:nowrap;flex-shrink:0;margin-top:1px}
.log-note{color:var(--text2);font-size:12px}
.tz-badge{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:6px 10px;text-align:center}
.tz-city{font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.tz-time{font-size:20px;font-weight:900;letter-spacing:-1px;color:var(--text)}
.tz-offset{font-size:10px;color:#333;margin-top:1px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(6px);animation:fi .2s ease}
.modal{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:16px;padding:26px;width:280px;text-align:center;animation:fup .25s ease}
.modal h3{font-size:16px;font-weight:800;margin-bottom:5px}
.modal p{color:var(--text3);font-size:12px;margin-bottom:18px}
.mbtns{display:flex;gap:9px}
.myes{flex:1;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border:none;border-radius:var(--rs);padding:10px;font-size:13px;font-weight:700;cursor:pointer}
.mno{flex:1;background:#111;color:var(--text3);border:1px solid #1f1f1f;border-radius:var(--rs);padding:10px;font-size:13px;cursor:pointer}

/* DASHBOARD */
.dcards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.dcard{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:var(--r);padding:16px;transition:all .2s}
.dcard:hover{border-color:#2a2a2a;transform:translateY(-2px)}
.dsec{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:var(--r);padding:16px;margin-bottom:12px}
.dsec h3{font-size:10px;font-weight:700;margin-bottom:12px;color:#333;text-transform:uppercase;letter-spacing:.1em}
.pb{height:4px;background:#111;border-radius:3px;overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:3px;transition:width .8s ease}
.tli{display:flex;justify-content:space-between;border-radius:var(--rx);padding:7px 11px;margin-bottom:4px;font-size:12px;background:#050505;border:1px solid #0f0f0f}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spin2{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CONTACT CARDS */
.contact-card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:8px 10px;margin-bottom:6px}
.contact-card.primary-card{border-color:rgba(255,106,0,.3)}
.contact-card.bounced-card{opacity:.5;border-color:rgba(239,68,68,.2)}
.cc-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cc-pri{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px}
.cc-pri.primary{background:rgba(255,106,0,.15);color:#ff8c38;border:1px solid rgba(255,106,0,.25)}
.cc-pri.backup{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.cc-pri.backup2{background:rgba(168,85,247,.1);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
.cc-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.cc-status.active{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.cc-status.bounced{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.cc-actions{display:flex;gap:4px;margin-top:6px}
.cc-btn{font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;border:1px solid;font-weight:600}
/* SENDER BADGE */
.sender-chip{font-size:10px;padding:1px 7px;border-radius:20px;background:rgba(59,130,246,.08);color:#60a5fa;border:1px solid rgba(59,130,246,.15);font-family:monospace;white-space:nowrap;display:inline-block;margin-top:2px}
.sender-chip.michael{background:rgba(168,85,247,.08);color:#c084fc;border-color:rgba(168,85,247,.15)}

/* TEMPLATES PANEL */

/* QUICK NOTE */
.qnote-form{background:#0a0a0a;border:1px solid var(--orange);border-radius:8px;padding:8px;margin-top:4px;display:flex;gap:6px;animation:fup .15s ease}
.qnote-inp{flex:1;background:#111;border:1px solid #1f1f1f;border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none}
.qnote-inp:focus{border-color:var(--orange)}

/* MOBILE */
@media(max-width:768px){
  .hacts .hb-g{display:none}
  .stats{grid-template-columns:repeat(3,1fr)}
  #app.lp{margin-right:0}
  #lp{width:100vw;right:-100vw}
  th:nth-child(6),th:nth-child(7),th:nth-child(8),th:nth-child(10),
  td:nth-child(6),td:nth-child(7),td:nth-child(8),td:nth-child(10){display:none}
  .ab:not(:first-child):not(:nth-child(2)){display:none}
  .main{padding:10px}
}
</style>
</head>
<body>

<div id="load" class="h"><div class="spin"></div><p id="ltxt">Loading…</p></div>

<div id="login">
  <div class="lcard">

    <!-- Logo -->
    <div style="position:relative;width:72px;height:72px;margin:0 auto 20px">
      <!-- orbit ring -->
      <div style="position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,106,0,.18)"></div>
      <!-- orbiting dot 1 -->
      <div style="position:absolute;width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#ff8c38,#e85000);top:calc(50% - 4px);left:calc(50% - 4px);box-shadow:0 0 12px 4px rgba(255,106,0,.9);animation:orb-spin 2.8s linear infinite"></div>
      <!-- orbiting dot 2 -->
      <div style="position:absolute;width:5px;height:5px;border-radius:50%;background:#ff6a00;top:calc(50% - 2.5px);left:calc(50% - 2.5px);opacity:.5;animation:orb-spin 2.8s linear infinite;animation-delay:-1.4s"></div>
      <!-- core box -->
      <div style="position:absolute;inset:11px;border-radius:12px;background:#000;border:1px solid rgba(255,106,0,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;z-index:2">
        <span style="font-size:17px;font-weight:900;color:#fff;font-family:system-ui;line-height:1">B</span>
        <span style="font-size:7px;font-weight:800;color:var(--orange);letter-spacing:2px;font-family:system-ui;line-height:1">DL</span>
      </div>
    </div>

    <h1 style="font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.4px">
      BDL Leads <span style="color:var(--orange3);font-size:13px;font-weight:500;letter-spacing:0">Pro</span>
    </h1>
    <p style="color:var(--text3);font-size:12px;margin-bottom:24px">B2B Sales Tracker · Sheets Sync</p>

    <input id="lu" placeholder="Username" onkeydown="if(event.key==='Enter')login()">
    <input id="lpw" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <div id="lerr" style="color:#fca5a5;font-size:12px;margin-bottom:8px;text-align:left" class="h"></div>
    <button class="lbtn" onclick="login()">Sign In →</button>
    <div id="lerr" style="color:#fca5a5;font-size:12px;margin-top:8px;text-align:left" class="h"></div>
  </div>
</div>

<div id="app" class="h">
  <div class="hdr">
    <div class="brand">
      <div class="logo">
        <div class="logo-ring"></div>
        <div class="logo-inner"><div class="logo-b">B</div><div class="logo-dl">DL</div></div>
      </div>
      <div class="brand-txt">
        <h1>BDL Leads <em>Pro</em></h1>
        <p id="lcount"></p>
      </div>
    </div>
    <div class="hacts">
      
      <div class="syns"><span id="sdot"></span><span id="stxt">Ready</span></div>
      <span id="fmsg" class="h"></span>
      <span id="ulbl"></span>
      <button class="hb hb-o" onclick="copyForClaude()" title="Copy pipeline summary to paste into Claude.ai">📋 Copy for Claude</button>
      <button class="hb hb-g" onclick="reloadSheets()">🔄 Reload</button>
      <button class="hb hb-g" onclick="exportCSV()" title="Download all leads as CSV">⬇️ CSV</button>
      <button class="hb hb-g" onclick="fixOverdue()" title="Reset all overdue follow-up dates from last log entry">🔧 Fix Overdue</button>

// Timezone map by city/state

  'Boston':'America/New_York','New York':'America/New_York','NYC':'America/New_York',

};

function ge(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function today(){return new Date().toISOString().split('T')[0];}
function now2(){return new Date().toLocaleString();}
function fmtDate(v){if(!v)return '';var d=new Date(v);return isNaN(d.getTime())?v:d.toISOString().split('T')[0];}
function lcChanged(val){
  if(!val)return;
  var fu=ge('lp-fu');
  if(fu)fu.value=nbiz(val,4);

function nbiz(from,days){var p=from.split('-');var dt=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));var n=0;days=days||4;while(n<days){dt.setDate(dt.getDate()+1);if(dt.getDay()!==0&&dt.getDay()!==6)n++;}var mm=dt.getMonth()+1,dd=dt.getDate();return dt.getFullYear()+'-'+(mm<10?'0':'')+mm+'-'+(dd<10?'0':'')+dd;}
function flash(m,t){var e=ge('fmsg');e.textContent=m;e.className=t==='bad'?'bad':'ok';e.classList.remove('h');setTimeout(function(){e.classList.add('h');},2500);}
function setSyn(s,t){var d=ge('sdot'),tx=ge('stxt');if(!d)return;d.className=s==='syn'?'s':s==='err'?'err':'';tx.textContent=t;}
function saveLoc(){
  leads=leads.map(function(l){
    var pem=getPrimaryEmail(l);
    return Object.assign({},l,{
      followUpCount:(l.outreachLog||[]).length,
      email:pem||l.email||''
    });
  });
  localStorage.setItem('bdl-v11',JSON.stringify({leads:leads,clients:clients}));
}
function loadLoc(){try{var d=JSON.parse(localStorage.getItem('bdl-v11')||localStorage.getItem('bdl-v10')||'null');return d||{leads:null,clients:[]};}catch(e){return{leads:null,clients:[]};}}
function normLeads(arr){return arr.map(function(l){['followUpDate','lastContacted'].forEach(function(k){if(l[k])l[k]=fmtDate(l[k]);});
  // Recalculate followUpDate — always derive from last log or lastContacted + 4 biz days
  var refDate='';
  if(l.outreachLog&&l.outreachLog.length){
    var lastLog=l.outreachLog[l.outreachLog.length-1];
    refDate=lastLog&&lastLog.date?lastLog.date:'';
    if(refDate)l.lastContacted=refDate;
  }
  if(!refDate&&l.lastContacted)refDate=l.lastContacted;
  // Auto-pull lastSender from last log entry that has a sender
  if(l.outreachLog&&l.outreachLog.length){
    for(var i=l.outreachLog.length-1;i>=0;i--){
      if(l.outreachLog[i].sender){l.lastSender=l.outreachLog[i].sender;break;}
    }
  }
  if(refDate){
    var expected4=nbiz(refDate,4);
    // Recalc if: no followUpDate, followUpDate is before refDate, or was set with old 3-day logic
    if(!l.followUpDate||l.followUpDate<refDate||l.followUpDate===nbiz(refDate,3)){
      l.followUpDate=expected4;
    }
  }if(!l.city)l.city='';if(!l.state)l.state='';if(!l.timezone)l.timezone='';if(!l.title)l.title='';if(!l.lastSender)l.lastSender='';if(!l.dealStage)l.dealStage='Contacted';if(l.dealValue===undefined)l.dealValue='';if(!l.contactLog)l.contactLog=[];if(!l.contacts||!l.contacts.length){l.contacts=l.email?[{id:String(Date.now())+'_m',name:l.contact||'',email:l.email,title:'',priority:'Primary',status:'Active'}]:[];}l.contacts=l.contacts.map(function(c){if(!c.status||c.status==='undefined')c.status='Active';if(!c.priority||c.priority==='undefined'||['Primary','Backup','Backup 2'].indexOf(c.priority)<0)c.priority=c.status==='Bounced'?'Backup':'Primary';return c;});return l;});}
function getPrimaryEmail(l){if(!l.contactLog)l.contactLog=[];if(!l.contacts||!l.contacts.length)return l.email||'';var a=l.contacts.find(function(c){return c.status!=='Bounced';});return a?a.email:(l.contacts[0]?l.contacts[0].email:l.email||'');}

// tz helpers
function guessTimezone(l){if(l.timezone)return l.timezone;var k=l.city||l.state||'';for(var city in TZ_MAP){if(k.toLowerCase().indexOf(city.toLowerCase())>=0)return TZ_MAP[city];}return null;}
function getLocalTime(tz){if(!tz)return null;try{return new Date().toLocaleTimeString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:true});}catch(e){return null;}}
function getLocalHour(tz){if(!tz)return null;try{return parseInt(new Date().toLocaleString('en-US',{timeZone:tz,hour:'numeric',hour12:false}));}catch(e){return null;}}
function isBestTime(tz){var h=getLocalHour(tz);if(h===null)return null;return h>=8&&h<18;}
function daysSince(d){if(!d)return null;var diff=Math.floor((new Date()-new Date(d))/(1000*60*60*24));return diff;}

// priority sort: overdue > today > warm > rest
function sortLeads(arr){var t=today();return arr.slice().sort(function(a,b){function pri(l){if(l.followUpDate&&l.followUpDate<t&&['Bounced','Replied'].indexOf(l.status)<0)return 0;if(l.followUpDate===t&&['Bounced','Replied'].indexOf(l.status)<0)return 1;if(l.status==='Warm Lead')return 2;if(l.status==='Replied')return 3;if(l.status==='Sent')return 4;if(l.status==='Pending')return 5;return 6;}return pri(a)-pri(b)||(a.followUpDate||'').localeCompare(b.followUpDate||'');});}

function getPriBadge(l){var t=today();if(l.followUpDate&&l.followUpDate<t&&['Bounced','Replied'].indexOf(l.status)<0)return'<span class="pri-badge" style="background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2)">🔥 Overdue</span>';if(l.followUpDate===t&&['Bounced','Replied'].indexOf(l.status)<0)return'<span class="pri-badge" style="background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.2)">⏰ Today</span>';if(l.status==='Warm Lead')return'<span class="pri-badge" style="background:rgba(255,106,0,.1);color:#ff8c38;border:1px solid rgba(255,106,0,.2)">♨️ Warm</span>';return'';}

// SHEETS
function sheetRead(){return fetch(SHEET_URL+'?_='+Date.now()).then(function(r){return r.json();}).catch(function(){return null;});}
function sheetWrite(p){
  setSyn('syn','Saving…');
  // DELETE stays as GET (tiny payload)
  if(p.action==='deleteLead'){
    fetch(SHEET_URL+'?action=deleteLead&id='+encodeURIComponent(p.id)+'&_='+Date.now())
      .then(function(r){return r.json();}).then(function(j){setSyn('',j.ok?'Synced ✓':'Error');}).catch(function(){setSyn('','Saved locally');});
    return;
  }
  // Use form-encoded POST — avoids CORS preflight issue with Apps Script
  var action=p.action||'upsertLead';
  var dataStr=p.action==='saveClients'
    ?JSON.stringify(p.data||[])
    :JSON.stringify(p.data||{});
  var body='action='+encodeURIComponent(action)+'&data='+encodeURIComponent(dataStr);
  fetch(SHEET_URL,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:body
  }).then(function(r){return r.json();})
    .then(function(j){setSyn('',j.ok?'Synced ✓':'Error: '+(j.error||''));})
    .catch(function(e){setSyn('','Saved locally');});
}
function syncLead(l){sheetWrite({action:'upsertLead',data:l});}
function syncDelete(id){sheetWrite({action:'deleteLead',id:String(id)});}
function syncClients(){sheetWrite({action:'saveClients',data:clients});}

function login(){
  var u=ge('lu').value.trim().toLowerCase(),p=ge('lpw').value,e=ge('lerr');
  if(!u||!p){e.textContent='Enter username and password';e.classList.remove('h');return;}
  e.classList.add('h');
  ge('login').classList.add('h');ge('load').classList.remove('h');ge('ltxt').textContent='Signing in…';
  // Check credentials against Sheets Users tab
  fetch(SHEET_URL+'?action=login&user='+encodeURIComponent(u)+'&pass='+encodeURIComponent(p)+'&_='+Date.now())
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data.ok){
      ge('load').classList.add('h');ge('login').classList.remove('h');
      e.textContent=data.error||'Wrong username or password';e.classList.remove('h');return;
    }
    who=data.name||u;
    ge('ltxt').textContent='Loading your pipeline…';
    // Merge Sheets + localStorage — keep whichever is more up to date per lead
    var sheetLeads=normLeads(data.leads||[]);
    var loc=loadLoc();
    var localLeads=normLeads(loc.leads||[]);
    if(sheetLeads.length>0&&localLeads.length>0){
      var localMap={};
      localLeads.forEach(function(l){localMap[String(l.id)]=l;});
      leads=sheetLeads.map(function(sl){
        var ll=localMap[String(sl.id)];
        if(!ll)return sl;
        var slLog=(sl.outreachLog||[]).length;
        var llLog=(ll.outreachLog||[]).length;
        if(llLog>slLog)return ll; // local has more logs — local wins
        if(slLog>llLog)return sl; // sheet has more logs — sheet wins
        // Same log count — pick whichever was contacted more recently
        var slDate=(sl.lastContacted||sl.followUpDate||'');
        var llDate=(ll.lastContacted||ll.followUpDate||'');
        return llDate>=slDate?ll:sl;
      });
      localLeads.forEach(function(ll){
        if(!leads.find(function(x){return String(x.id)===String(ll.id);}))leads.push(ll);
      });
    } else if(sheetLeads.length>0){
      leads=sheetLeads;
    } else if(localLeads.length>0){
      leads=localLeads;
    }
    clients=data.clients||loc.clients||[];
    saveLoc();
    // Auto-push leads that are ahead of Sheets back up (more logs OR updated followUpDate/lastContacted)
    var toSync=sheetLeads.filter(function(sl){
      var ll=leads.find(function(x){return String(x.id)===String(sl.id);});
      if(!ll)return false;
      if((ll.outreachLog||[]).length>(sl.outreachLog||[]).length)return true;
      if(ll.followUpDate!==sl.followUpDate)return true;
      if(ll.lastContacted!==sl.lastContacted)return true;
      return false;
    });
    if(toSync.length){var si=0;(function doSync(){if(si>=toSync.length)return;syncLead(toSync[si]);si++;setTimeout(doSync,150);})();}
    loadSenders(data.senders||[]);setTimeout(function(){ge('load').classList.add('h');ge('app').classList.remove('h');ge('ulbl').textContent='👤 '+who;initNF();renderAll();startClock();setTimeout(checkReminders,2000);},500);
  })
  .catch(function(){
    // Fallback to localStorage if Sheets unreachable
    ge('ltxt').textContent='Sheets offline, loading local data…';
    var loc=loadLoc();
    if(loc.users){
      var usr=loc.users[u];
      if(!usr||usr.password!==p){ge('load').classList.add('h');ge('login').classList.remove('h');e.textContent='Wrong username or password';e.classList.remove('h');return;}
      who=usr.name;
    } else {who=u;}
    leads=loc.leads||[];clients=loc.clients||[];loadSenders();
    setTimeout(function(){ge('load').classList.add('h');ge('app').classList.remove('h');ge('ulbl').textContent='👤 '+who;initNF();renderAll();startClock();setTimeout(checkReminders,2000);},500);
  });
}
function logout(){ge('app').classList.add('h');ge('login').classList.remove('h');ge('lu').value='';ge('lpw').value='';leads=[];clients=[];who='';closeLp();stopClock();}
function reloadSheets(){ge('load').classList.remove('h');sheetRead().then(function(d){if(d&&d.leads&&d.leads.length){leads=normLeads(d.leads);clients=d.clients||[];saveLoc();}ge('load').classList.add('h');renderAll();flash('✓ Reloaded!');});}
function syncAll(){
  var i=0;
  setSyn('syn','Syncing 0/'+leads.length+'…');
  function n(){
    if(i>=leads.length){
      setSyn('','✓ Synced '+leads.length+'!');
      flash('✓ All '+leads.length+' leads synced!');

    }
    setSyn('syn','Syncing '+(i+1)+'/'+leads.length+'…');

  else{ge('fst').value=f;ge('fpri').value='All';}
  rl();
}
function ra(){
  var t=today();
  var ov=leads.filter(function(l){return l.followUpDate&&l.followUpDate<t&&['Bounced','Replied'].indexOf(l.status)<0;});
  var dt=leads.filter(function(l){return l.followUpDate===t&&['Bounced','Replied'].indexOf(l.status)<0;});
  var warm=leads.filter(function(l){return l.status==='Warm Lead';});
  // Stale: Sent or Pending, last contacted 4+ days ago, no future followUpDate, not bounced/replied
  var stale=leads.filter(function(l){
    if(['Bounced','Replied','Warm Lead','Client'].indexOf(l.status)>=0)return false;
    if(['Sent','Pending','Contacted'].indexOf(l.status)<0)return false;
    if(l.followUpDate&&l.followUpDate>=t)return false; // already has future FU date
    if(!l.lastContacted)return false;
    var lc=new Date(l.lastContacted),td=new Date(t);
    var days=Math.floor((td-lc)/(1000*60*60*24));
    return days>=4;
  });
  var actionLeads=ov.concat(dt).concat(warm.filter(function(l){return ov.indexOf(l)<0&&dt.indexOf(l)<0;})).concat(stale.filter(function(l){return ov.indexOf(l)<0&&dt.indexOf(l)<0&&warm.indexOf(l)<0;}));
  // dedupe
  var seen={};actionLeads=actionLeads.filter(function(l){if(seen[l.id])return false;seen[l.id]=true;return true;});
  var h='';
  if(!actionLeads.length){ge('alerts').innerHTML='';return;}

  // header bar
  h+='<div style="background:#0a0f1a;border:1px solid #1e293b;border-radius:10px;margin-bottom:12px;overflow:hidden;">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0d1424;border-bottom:1px solid #1e293b;">';
  h+='<div style="display:flex;align-items:center;gap:10px;">';
  h+='<span style="font-size:15px;">📋</span>';
  h+='<span style="color:#f97316;font-weight:700;font-size:13px;letter-spacing:.3px">TODAY\'S ACTION PLAN</span>';
  h+='<span style="font-size:11px;color:#475569;">'+t+'</span>';
  h+='</div>';
  h+='<div style="display:flex;gap:6px;">';
  if(ov.length)h+='<span style="background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;">🔥 '+ov.length+' Overdue</span>';
  if(dt.length)h+='<span style="background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.2);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;">⏰ '+dt.length+' Due Today</span>';
  if(warm.length)h+='<span style="background:rgba(249,115,22,.1);color:#f97316;border:1px solid rgba(249,115,22,.2);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;">♨️ '+warm.length+' Warm</span>';
  if(stale.length)h+='<span style="background:rgba(100,116,139,.12);color:#94a3b8;border:1px solid rgba(100,116,139,.2);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;">📬 '+stale.length+' Follow Up</span>';
  h+='</div></div>';

  // action rows
  h+='<div style="padding:6px 0;">';
  actionLeads.forEach(function(l){
    var isOv=ov.indexOf(l)>=0,isDt=dt.indexOf(l)>=0,isWarm=l.status==='Warm Lead',isStale=stale.indexOf(l)>=0;
    var badge=isOv?'<span style="background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;">🔥 OVERDUE</span>':isDt?'<span style="background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.2);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;">⏰ TODAY</span>':isWarm?'<span style="background:rgba(249,115,22,.1);color:#f97316;border:1px solid rgba(249,115,22,.2);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;">♨️ WARM</span>':'<span style="background:rgba(100,116,139,.12);color:#94a3b8;border:1px solid rgba(100,116,139,.2);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;">📬 FOLLOW UP</span>';
    var lastLog=l.outreachLog&&l.outreachLog.length?l.outreachLog[l.outreachLog.length-1]:null;
    var lastAction=lastLog?lastLog.note:'No log yet';
    if(lastAction.length>60)lastAction=lastAction.substring(0,60)+'…';
    h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid #0d1424;transition:background .15s" onmouseover="this.style.background=\'#0d1424\'" onmouseout="this.style.background=\'transparent\'">';

    h+='<span style="color:#475569;font-size:11px;flex:1;">'+esc(lastAction)+'</span>';
    h+='<div style="display:flex;gap:4px;">';
    h+='<button class="ab" style="background:var(--orange);color:#fff;font-size:10px;padding:3px 8px" onclick="openLp(\''+l.id+'\')">Open</button>';

    h+='</div>';
    h+='</div>';
  });
  h+='</div></div>';
  ge('alerts').innerHTML=h;

function gf(){
  var q=(ge('srch').value||'').toLowerCase(),fs=ge('fst').value,fn=ge('fni').value,fp=ge('fpri').value,t=today();
  return leads.filter(function(l){
    if(q&&l.company.toLowerCase().indexOf(q)<0&&l.contact.toLowerCase().indexOf(q)<0&&String(l.num).indexOf(q)<0)return false;
    if(fs!=='All'&&l.status!==fs)return false;
    if(fn!=='All'&&l.niche!==fn)return false;
    if(fp==='overdue'&&!(l.followUpDate&&l.followUpDate<t&&['Bounced','Replied'].indexOf(l.status)<0))return false;
    if(fp==='today'&&!(l.followUpDate===t&&['Bounced','Replied'].indexOf(l.status)<0))return false;
    var pri=ge('fpri')?ge('fpri').value:'';
    if(pri==='overdue'&&!(l.followUpDate&&l.followUpDate<t&&['Bounced','Replied'].indexOf(l.status)<0))return false;
    if(pri==='today'&&!(l.followUpDate===t&&['Bounced','Replied'].indexOf(l.status)<0))return false;
    if(pri==='warm'&&l.status!=='Warm Lead')return false;
    if(pri==='replied'&&l.status!=='Replied')return false;
    if(pri==='nodm'&&l.decisionMaker==='Yes')return false;
    if(pri==='dm'&&l.decisionMaker!=='Yes')return false;
    var fsender=ge('fsender')?ge('fsender').value:'';
    if(fsender&&!(l.lastSender&&l.lastSender.indexOf(fsender)>=0))return false;
    return true;
  });
}

function ust(id,status){var lc=today();leads=leads.map(function(l){return String(l.id)===String(id)?Object.assign({},l,{status,lastContacted:lc,followUpDate:nbiz(lc,4)}):l;});saveLoc();rl();var u=leads.find(function(l){return String(l.id)===String(id);});if(u)syncLead(u);}
function dfu(id){
  var l=leads.find(function(x){return String(x.id)===String(id);});if(!l)return;
  // Pick sender — default to last used or first sender
  var lastUsed=l.lastSender||SENDERS[0];
  var sOpts=SENDERS.map(function(s,i){return i+': '+s.split('@')[0];}).join('\n');
  var pick=prompt('Sender for '+l.company+' follow-up:\n'+sOpts+'\n\nEnter 0 or 1 (or leave blank for: '+lastUsed.split('@')[0]+'):','');
  var sender=lastUsed;
  if(pick==='0')sender=SENDERS[0];
  else if(pick==='1')sender=SENDERS[1];
  var lc=today();
  leads=leads.map(function(x){
    if(String(x.id)!==String(id))return x;
    return Object.assign({},x,{
      lastContacted:lc,lastSender:sender,
      followUpDate:nbiz(lc,4),
      followUpCount:(x.followUpCount||0)+1,
      outreachLog:(x.outreachLog||[]).concat([{date:lc,note:'Follow-up sent',sender:sender}])
    });
  });
  saveLoc();rl();
  var u=leads.find(function(x){return String(x.id)===String(id);});if(u)syncLead(u);
  flash('✓ Follow-up logged from '+sender.split('@')[0]);
}

function renderLp(){
  var l=leads.find(function(x){return String(x.id)===String(lpId);});
  if(!l)return;
  var tz=guessTimezone(l)||l.timezone;
  var lt=tz?getLocalTime(tz):null;
  var bt=tz?isBestTime(tz):null;
  var ds=daysSince(l.lastContacted);
  var sc=SC[l.status]||'#333';
  var nc=NC[l.niche]||'#333';

  // clocks for all US zones
  var zones=[['Eastern','America/New_York'],['Central','America/Chicago'],['Mountain','America/Denver'],['Pacific','America/Los_Angeles']];
  var clockHtml=zones.map(function(z){
    var t=getLocalTime(z[1]);var h=getLocalHour(z[1]);var good=h>=8&&h<18;
    var isLead=tz&&tz===z[1];
    return'<div class="tz-badge" style="'+(isLead?'border-color:var(--orange);background:rgba(255,106,0,.06)':'')+'">'+
      '<div class="tz-city">'+z[0]+'</div>'+
      '<div class="tz-time" id="tz-'+z[1].replace(/\//g,'_')+'" style="font-size:16px;color:'+(good?'var(--text)':'#475569')+'">'+t+'</div>'+
      '<div class="tz-offset" style="color:'+(good?'#22c55e':'#475569')+'">'+(good?'✓ Good time':'💤 Off hours')+'</div>'+
    '</div>';
  }).join('');

  // Contact change log
  var contactLogHtml=(l.contactLog&&l.contactLog.length)?
    '<div style="margin-top:10px;border-top:1px solid #111;padding-top:10px">'+
    '<div style="font-size:10px;font-weight:800;color:#333;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Contact Change History</div>'+
    (l.contactLog||[]).slice().reverse().map(function(e){

function fixOverdue(){
  var t=today();
  var fixed=0;
  leads=leads.map(function(l){
    if(['Bounced','Replied'].indexOf(l.status)>=0)return l;
    if(l.followUpDate&&l.followUpDate>=t)return l; // not overdue, leave it
    // Calculate from last log entry date, or lastContacted, or today
    var lastDate=null;
    if(l.outreachLog&&l.outreachLog.length){
      var sorted=(l.outreachLog||[]).slice().sort(function(a,b){return a.date>b.date?1:-1;});
      lastDate=sorted[sorted.length-1].date;
    }
    if(!lastDate)lastDate=l.lastContacted||t;
    var newFU=nbiz(lastDate,4);
    // If even that is still in the past, set to next 3 business days from today
    if(newFU<t)newFU=nbiz(t,4);
    fixed++;
    return Object.assign({},l,{followUpDate:newFU,lastContacted:lastDate||l.lastContacted});
  });
  saveLoc();rl();
  if(fixed>0){
    flash('✓ Fixed '+fixed+' overdue leads!');
    // Sync all fixed leads to sheets
    var i=0;var toSync=leads.filter(function(l){return['Bounced','Replied'].indexOf(l.status)<0;});
    function syncNext(){if(i>=toSync.length)return;syncLead(toSync[i]);i++;setTimeout(syncNext,100);}
    syncNext();
  } else {
    flash('No overdue leads to fix!');
  }
}

function trigImport(){ge('csvFileIn').click();}

function handleImport(e){
  var file=e.target.files[0];
  if(!file)return;
  var ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'){
    var reader=new FileReader();
    reader.onload=function(ev){parseCSVImport(ev.target.result);};
    reader.readAsText(file);
  } else {
    flash('Please upload a CSV file (.csv)','bad');
  }
  e.target.value='';
}

function parseCSVImport(text){
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2){flash('CSV appears empty','bad');return;}

  var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'').toLowerCase();});

  var colMap={
    company:     ['company','company name','business','organization','name'],
    contact:     ['contact','contact name','first name','full name','person','rep'],
    email:       ['email','email address','work email'],
    phone:       ['phone','phone number','mobile','cell'],
    niche:       ['niche','industry','sector','vertical'],
    status:      ['status','lead status','stage'],
    notes:       ['notes','note','comments','details'],
    sender:      ['sender','assigned to','owner'],
    followUpDate:['follow up date','followupdate','follow-up date','next contact'],
    website:     ['website','url','web','site'],
    title:       ['title','job title','role','position'],
    num:         ['#','num','number','lead #','lead number']
  };

  function findCol(key){
    var aliases=colMap[key]||[key];
    for(var i=0;i<aliases.length;i++){var idx=headers.indexOf(aliases[i]);if(idx>-1)return idx;}
    return -1;
  }
  var cols={};Object.keys(colMap).forEach(function(k){cols[k]=findCol(k);});
  function getVal(row,key){var idx=cols[key];if(idx<0||idx>=row.length)return'';return row[idx].trim().replace(/^"|"$/g,'');}

  // ── Group rows by company name ──
  var grouped={};var groupOrder=[];
  var existingEmails=leads.map(function(l){return(l.email||'').toLowerCase();});

  for(var i=1;i<lines.length;i++){
    var row=lines[i].match(/(".*?"|[^,]+)/g)||lines[i].split(',');
    row=row.map(function(c){return c?c.trim().replace(/^"|"$/g,''):''});
    var company=getVal(row,'company');
    if(!company)continue;
    var key=company.toLowerCase().trim();
    if(!grouped[key]){grouped[key]={company:company,rows:[],num:getVal(row,'num'),niche:getVal(row,'niche'),status:getVal(row,'status'),notes:getVal(row,'notes'),sender:getVal(row,'sender'),followUpDate:getVal(row,'followUpDate'),website:getVal(row,'website')};groupOrder.push(key);}
    grouped[key].rows.push(row);
  }

  var newLeads=[];var imported=0;var dupes=0;var skipped=0;

  groupOrder.forEach(function(key){
    var g=grouped[key];
    // Check if company already exists in leads
    var existingLead=leads.find(function(l){return l.company.toLowerCase().trim()===key;});

    // Build contacts array from all rows for this company
    var contacts=[];
    g.rows.forEach(function(row,ri){
      var email=getVal(row,'email');
      var contact=getVal(row,'contact');
      if(!email&&!contact)return;
      if(email&&existingEmails.indexOf(email.toLowerCase())>-1){dupes++;return;}
      var priority=ri===0?'Primary':ri===1?'Backup':'Backup 2';
      contacts.push({id:String(Date.now())+'-'+ri+Math.random().toString(36).slice(2,5),name:contact,email:email,title:getVal(row,'title'),priority:priority,status:'Active'});
      if(email)existingEmails.push(email.toLowerCase());
    });

    if(!contacts.length){skipped++;return;}

    if(existingLead){
      // Merge new contacts into existing lead
      var merged=Object.assign({},existingLead,{contacts:(existingLead.contacts||[]).concat(contacts)});
      leads=leads.map(function(l){return String(l.id)===String(existingLead.id)?merged:l;});
      flash('↩ Merged '+contacts.length+' contact(s) into existing lead: '+g.company);
      syncLead(merged);
      return;
    }

    var primaryContact=contacts[0]||{};
    var nl={
      id:'bdl_imp_'+Date.now()+Math.random().toString(36).slice(2,6),
      num:g.num||String(leads.length+newLeads.length+1),
      company:g.company,
      contact:primaryContact.name||'',
      email:primaryContact.email||'',
      title:primaryContact.title||'',
      contacts:contacts,
      niche:g.niche||'',
      status:g.status||'Pending',
      notes:g.notes||'',
      sender:g.sender||who,
      followUpDate:g.followUpDate||today(),
      website:g.website||'',
      lastContacted:today(),
      followUpCount:0,
      outreachLog:[],
      contactLog:[]
    };
    newLeads.push(nl);
    imported++;
  });

  if(!imported&&!dupes&&!skipped){flash('No valid leads found in CSV','bad');return;}

  leads=leads.concat(newLeads);
  saveLoc();
  newLeads.forEach(function(l){syncLead(l);});
  renderAll();

  var msg='✓ Imported '+imported+' lead'+(imported!==1?'s':'');
  if(dupes)msg+=' · '+dupes+' dupe email'+(dupes!==1?'s':'')+' skipped';
  if(skipped)msg+=' · '+skipped+' blank row'+(skipped!==1?'s':'')+' skipped';
  flash(msg);
}

  var niche=ge('qi-niche').value||'';
  var sender=(ge('qi-sender').value||who).trim();
  var notes=(ge('qi-notes').value||'').trim();
  var fuDate=today();

  var emails=raw.split(/[\n,;\s]+/).map(function(e){return e.trim().toLowerCase();}).filter(function(e){return e&&e.indexOf('@')>-1;});
  if(!emails.length){flash('No valid emails found','bad');return;}

  var existingEmails=leads.map(function(l){return(l.email||'').toLowerCase();});
  var imported=0,dupes=0;

    if(existingEmails.indexOf(email)>-1){dupes++;return;}
    // Derive company name from email domain

    company=company.charAt(0).toUpperCase()+company.slice(1);
    var nl={
      id:'qi_'+Date.now()+'_'+i+Math.random().toString(36).slice(2,5),
      num:String(leads.length+newLeads.length+1),
      company:company,
      contact:'',
      email:email,
      title:'',
      contacts:[{id:'c'+Date.now()+'_'+i,name:'',email:email,title:'',priority:'Primary',status:'Active'}],
      niche:niche,
      status:'Sent',
      notes:notes,
      sender:sender,
      followUpDate:nbiz(fuDate,7),
      lastContacted:fuDate,
      followUpCount:1,
      outreachLog:[{date:fuDate,note:'Bulk email sent'+(notes?' — '+notes:''),sender:sender}],
      contactLog:[],
      website:'',
      city:'',state:'',timezone:''
    };
    newLeads.push(nl);
    existingEmails.push(email);
    imported++;
  });

  if(!imported){
    ge('qi-status').textContent=dupes+' already in tracker';
    return;
  }

  leads=leads.concat(newLeads);
  saveLoc();
  newLeads.forEach(function(l){syncLead(l);});
  renderAll();

  ge('qi-emails').value='';
  ge('qi-notes').value='';
  ge('qi-status').textContent='';
  ge('qi-panel').classList.add('h');

  var msg='✓ Added '+imported+' lead'+(imported!==1?'s':'');
  if(dupes)msg+=' · '+dupes+' already in tracker';
  flash(msg);
}

// ── EXPORT CSV ──────────────────────────────────────
function exportCSV(){
  var cols=['id','num','company','contact','email','title','niche','status','dealStage','dealValue',
    'decisionMaker','city','state','followUpDate','lastContacted','followUpCount','notes','pitchSent'];
  var rows=[cols.join(',')];
  leads.forEach(function(l){
    var row=cols.map(function(c){
      var v=String(l[c]||'').replace(/"/g,'""');
      if(v.indexOf(',')>=0||v.indexOf('"')>=0||v.indexOf('\n')>=0)v='"'+v+'"';
      return v;
    });
    rows.push(row.join(','));
  });
  var blob=new Blob([rows.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='BDL_Leads_'+today()+'.csv';
  a.click();
  flash('✓ CSV downloaded!');
}

function saveQNote(id){
  var inp=document.getElementById('qnote-inp-'+id);
  var dateEl=document.getElementById('qnote-date-'+id);
  var senderEl=document.getElementById('qnote-sender-'+id);
  var note=inp?inp.value.trim():'';
  if(!note)return;
  var logDate=dateEl?dateEl.value:today();
  var sender=senderEl?senderEl.value:'';
  leads=leads.map(function(x){
    if(String(x.id)!==String(id))return x;
    var log=(x.outreachLog||[]).concat([{date:logDate,note:note,sender:sender}]);
    return Object.assign({},x,{outreachLog:log,lastContacted:logDate,followUpDate:nbiz(logDate,4)});
  });
  saveLoc();
  var row=document.getElementById('qnote-row-'+id);
  if(row)row.style.display='none';
  rl();
  var u=leads.find(function(x){return String(x.id)===String(id);});
  if(u)syncLead(u);
  flash('✓ Note saved!');
}

// ── BROWSER REMINDER CHECK ───────────────────────────
function checkReminders(){
  if(!('Notification' in window))return;
  var t=today();
  var due=leads.filter(function(l){return l.followUpDate===t&&['Bounced','Replied'].indexOf(l.status)<0;});
  var ov=leads.filter(function(l){return l.followUpDate&&l.followUpDate<t&&['Bounced','Replied'].indexOf(l.status)<0;});
  if((due.length||ov.length)&&Notification.permission==='granted'){
    var msg=[];
    if(ov.length)msg.push(ov.length+' overdue');
    if(due.length)msg.push(due.length+' due today');
    new Notification('BDL Leads Pro',{body:msg.join(' · ')+' follow-ups need attention',icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>'});
  } else if(Notification.permission==='default'&&(due.length||ov.length)){
    Notification.requestPermission();
  }
}

      '<div style="font-size:8px;color:#1e293b;white-space:nowrap">'+d.label+'</div>'+
    '</div>';
  });
  html+='</div></div>';

  html+='<div style="'+card+'grid-column:span 2">'+
    '<span style="'+label+'">🎯 By Niche</span>';
  niches.forEach(function(n){

        '<div style="background:'+nc+';height:5px;border-radius:4px;width:'+pct+'%;transition:width .5s ease"></div>'+

        '</div></div>';

  // ── ROW 4: Deal stage funnel ──
  html+='<div style="'+card+'">'+
    '<span style="'+label+'">🔀 Deal Stage Funnel</span>';
  var stages=[['Prospecting','#475569'],['Contacted','#60a5fa'],['Sample Sent','#f97316'],['Negotiating','#facc15'],['Closed Won','#4ade80'],['Closed Lost','#ef4444']];
  var maxStage=Math.max.apply(null,stages.map(function(s){return stageMap[s[0]]||0;}));
  stages.forEach(function(s){

  var topCombos=Object.keys(nicheStateData).filter(function(k){return nicheStateData[k].total>=2;})

        html+='<div style="background:#111827;border-radius:3px;height:4px"><div style="background:'+clr+';height:4px;border-radius:3px;width:'+Math.min(rate*2,100)+'%"></div></div>';

        html+='</div>';
        html+='<span style="font-size:12px;font-weight:800;color:'+clr+'">'+rate+'%</span>';
        html+='<span style="font-size:10px;color:#334155">'+d.total+' leads</span>';
        html+='</div>';
      });
    } else {
      html+='<div style="color:#334155;font-size:11px;padding:20px 0;text-align:center">Add state to 3+ leads to see rankings</div>';
    }
    html+='</div>';

    // Panel 2: Best niche+state combos
    html+='<div>';
    html+='<div style="font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">🏆 Best Niche + State Combos</div>';
    if(topCombos.length){
      var NC2={'Education':'#60a5fa','Dental':'#34d399','Healthcare/Staffing':'#f472b6','SaaS':'#a78bfa','Finance/Lending':'#facc15','Real Estate':'#fb923c','AI/Tech':'#e879f9'};
      topCombos.forEach(function(k,i){
        var d=nicheStateData[k];
        var rate=Math.round(d.replied/d.total*100);
        var clr=NC2[d.niche]||'#475569';

        html+='<div style="text-align:right">';

        html+='</div>';
        html+='</div>';
      });
    } else {
      html+='<div style="color:#334155;font-size:11px;padding:20px 0;text-align:center">Data builds up as you log outreach over time</div>';
    }
    html+='</div>';

    html+='</div>'; // end 3-col grid
  }
  html+='</div>'; // end location card

  html+='</div>';
  da.innerHTML=html;
}

// ── CONTACT PANEL FUNCTIONS ───────────────────────────
function openAddContact(){
  var f=ge('add-contact-form');
  if(f){f.classList.remove('h');var ni=ge('nc-name');if(ni)ni.focus();}
}
function closeAddContact(){
  var f=ge('add-contact-form');if(f)f.classList.add('h');
  ['nc-name','nc-title','nc-email'].forEach(function(id){var el=ge(id);if(el)el.value='';});
  var pr=ge('nc-priority');if(pr)pr.value='Backup';
}
function saveNewContact(){
  var name=(ge('nc-name')?ge('nc-name').value.trim():'');
  var title=(ge('nc-title')?ge('nc-title').value.trim():'');
  var email=(ge('nc-email')?ge('nc-email').value.trim():'');
  var priority=(ge('nc-priority')?ge('nc-priority').value:'Backup');
  if(!name&&!email){flash('Enter name or email','bad');return;}
  leads=leads.map(function(x){
    if(String(x.id)!==String(lpId))return x;
    var contacts=(x.contacts||[]).slice();
    // If new contact is Primary, demote existing primary to Backup
    if(priority==='Primary'){
      contacts=contacts.map(function(c){
        return c.priority==='Primary'?Object.assign({},c,{priority:'Backup'}):c;
      });
    }
    var nc={id:Date.now()+'_c',name:name,title:title,email:email,priority:priority,status:'Active'};
    contacts.push(nc);
    var updates={contacts:contacts};
    // If new contact is primary, update main fields too
    if(priority==='Primary'){updates.contact=name||x.contact;updates.email=email||x.email;updates.title=title||x.title;}
    return Object.assign({},x,updates);
  });
  saveLoc();closeAddContact();renderLp();rl();
  var u=leads.find(function(x){return String(x.id)===String(lpId);});if(u)syncLead(u);
  flash('✓ Contact added!');
}
</script>
